# Render.com Deployment Blueprint
# Deploy at: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: auditor-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_HOST
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Frontend (Static Site)
  - type: web
    name: auditor-ai-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
